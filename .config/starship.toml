# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """\
$os$hostname$shell\
$directory\
$git_branch$hg_branch\
$git_state\
$git_status\
$sudo\
$character\
"""

continuation_prompt = '[  => ](green bold)'

right_format = '$git_metrics'

[character]
success_symbol = '[ ¾░üö](green bold)'
error_symbol = '[ ¾░üö](red bold)'
vimcmd_symbol = '[ ¯ƒà](blue bold)'

[os]
format = '$symbol'
disabled = false

[os.symbols]
Windows = '[¯ÿ¬ ](#00C6FF)'
Ubuntu = '[¾░òê ](#FF7800)'
Arch = '[¾░úç ](#00C6FF)'

[hostname]
format = '[\($hostname\)]($style) '
style = 'yellow'

[shell]
format = '$indicator'
fish_indicator = '¾░ê║ '
powershell_indicator = '¾░¿è '
bash_indicator = '¯»è '
cmd_indicator = '¯»ä '
zsh_indicator = '[Z](bold)'
unknown_indicator = '$'
disabled = false

[directory]
format = ' [$path]($style)[$read_only]($read_only_style)'
read_only_style = 'red'
style = 'cyan bold'
read_only = ' ´Çú '
home_symbol = '´ôó ~'
truncation_length = 3
truncate_to_repo = false
truncation_symbol = 'ÔÇª/'

[sudo]
format = '[$symbol]($style)'
style = 'bold yellow'
symbol = ' ¾▒Éï'
disabled = false

[git_branch]
format = ' [$symbol\($branch(:$remote_branch)\)]($style)'
symbol = '¾░èó '
style = 'red'

[hg_branch]
format = '[ $symbol$branch ]($style)'
symbol = '´Éÿ '

[git_status]
format = "([\\[](red)$conflicted$staged$modified$deleted$renamed$untracked$stashed[\\]](red))( $ahead_behind)"

conflicted = "[ !$count! ](red bold)"
ahead = "[Ôåæ${count}](yellow bold)"
behind = "[Ôåô${count}](yellow bold)"
diverged = "[Ôåæ${ahead_count}Ôåô${behind_count}](yellow bold)"
untracked = "[!$count](cyan bold)"
stashed = "[~$count](bold blue bold)"
modified = "[+$count](yellow bold)"
staged = "[+$count](green bold)"
renamed = "[>$count](green bold)"
deleted = "[-$count](red bold)"


# Right prompt 

[username]
format = ' [´Çç $user]($style)'

[cmd_duration]
format = ' ´Çù  [$duration](bold yellow)'
min_time = 500

[git_metrics]
format = '( [git](red) \(([+$added]($added_style))([-$deleted]($deleted_style))\))'
disabled = false

[package]
format = ' [$symbol$version]($style) '

[nodejs]
format = ' [$symbol($version)]($style)'
style = 'bold green'

[bun]
format = ' [$symbol($version)]($style)'
style = 'bold white'

[python]
format = ' [${symbol}${pyenv_prefix}(${version})( \($virtualenv\))]($style)'
symbol = '¾░îá '

[rust]
format = ' [$symbol($version )]($style)'
symbol = '¾▒ÿù '

[lua]
format = ' [$symbol($version )]($style)'
symbol = '¾░ó▒ '

[golang]
format = ' [$symbol($version )]($style)'
symbol = '¾░ƒô '

[c]
format = " [$symbol($version(-$name) )]($style)"
symbol = "¯ÿ× "

[docker_context]
format = " [$symbol$context]($style) "
style = "blue bold"
symbol = "´êƒ "
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
disabled = false

[container]
format = "[$symbol \\[$name\\]]($style) "
disabled = false
