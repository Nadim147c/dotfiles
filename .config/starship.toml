# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """\
$os$hostname$shell\
$directory\
$git_branch$hg_branch\
$git_state\
$git_status\
$sudo\
$character\
"""

continuation_prompt = '[  => ](green bold)'

right_format = '${custom.git_tag}$docker_context$all'

[character]
success_symbol = '[ ≤░üõ](green bold)'
error_symbol = '[ ≤░üõ](red bold)'
vimcmd_symbol = '[ εÓà](blue bold)'

[os]
format = '$symbol'
disabled = false

[os.symbols]
Windows = '[εÌ¬ ](#00C6FF)'
Ubuntu = '[≤░òê ](#FF7800)'
Arch = '[≤░úç ](#00C6FF)'

[hostname]
format = '[\($hostname\)]($style) '
style = 'yellow'

[shell]
format = '$indicator'
fish_indicator = '≤░ê║'
powershell_indicator = '≤░¿è'
bash_indicator = 'ε»è'
cmd_indicator = 'ε»ã'
zsh_indicator = '[Z](bold)'
nu_indicator = "[≤░ÓÁ](green)"
unknown_indicator = '$'
disabled = false

[directory]
format = ' [$path]($style)[$read_only]($read_only_style)'
read_only_style = 'red'
style = 'cyan bold'
read_only = ' ∩Çú '
home_symbol = '∩ôó ~'
truncation_length = 2
truncate_to_repo = false
truncation_symbol = 'ΓÇª/'

[sudo]
format = '[$symbol]($style)'
style = 'bold yellow'
symbol = ' ≤▒ÉÍ'
disabled = false

[git_branch]
format = ' [$symbol\($branch(:$remote_branch)\)]($style)'
symbol = ''
style = 'red'

[hg_branch]
format = '[ $symbol$branch ]($style)'
symbol = '∩ÉÌ '

[git_status]
format = "([\\[](red)$conflicted$staged$modified$deleted$renamed$untracked$stashed[\\]](red))( $ahead_behind)"

conflicted = "[ !$count! ](red bold)"
ahead = "[ΓÁÀ${count}](yellow bold)"
behind = "[ΓÁô${count}](yellow bold)"
diverged = "[ΓÁÀ${ahead_count}ΓÁô${behind_count}](yellow bold)"
untracked = "[!$count](cyan bold)"
stashed = "[~$count](bold blue bold)"
modified = "[+$count](yellow bold)"
staged = "[+$count](green bold)"
renamed = "[>$count](green bold)"
deleted = "[-$count](red bold)"


# Right prompt

[username]
format = ' [∩Çç $user]($style)'

[cmd_duration]
format = ' ∩Çù  [$duration](bold yellow)'
min_time = 500

[git_metrics]
format = '( [≤░èó ](red)\(([+$added]($added_style))([-$deleted]($deleted_style))\))'
disabled = false

[custom.git_tag]
format = "([$symbol($output)]($style))"
command = "git describe --tags --abbrev=0"
when = "git rev-parse --is-inside-work-tree"
symbol = "≤░ô╝ "
style = "bold red"

[package]
format = ' [$symbol$version]($style) '

[nodejs]
format = ' [$symbol($version)]($style)'
style = 'bold green'

[bun]
format = ' [$symbol($version)]($style)'
style = 'bold white'

[python]
format = ' [${symbol}${pyenv_prefix}(${version})( \($virtualenv\))]($style)'
symbol = '≤░Ôá '

[rust]
format = ' [$symbol($version )]($style)'
symbol = '≤▒Ìù '

[lua]
format = ' [$symbol($version )]($style)'
symbol = '≤░ó▒ '

[golang]
format = ' [$symbol($version )]($style)'
symbol = '≤░Óô '

[c]
format = " [$symbol($version(-$name) )]($style)"
symbol = "εÌ₧ "

[docker_context]
format = " [$symbol$context]($style) "
style = "blue bold"
symbol = "∩êÓ "
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
disabled = false

[container]
format = "[$symbol \\[$name\\]]($style) "
disabled = false
