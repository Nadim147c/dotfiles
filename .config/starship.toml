# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """\
$os$shell\
$directory\
$git_branch\
$git_status\
$git_metrics\
$sudo\
$character\
"""

continuation_prompt = '[  => ](green bold)'

right_format = "$all"

[character]
success_symbol = "[ ¾░üö](green bold)"
error_symbol = "[ ¾░üö](red bold)"
vimcmd_symbol = "[ Ņ¤ģ](blue bold)"

[os]
format = '$symbol'
disabled = false

[os.symbols]
Windows = "[Ņś¬ ](#00C6FF)"
Ubuntu = "[¾░Ģł ](#FF7800)"
Arch = "[¾░Żć ](#00C6FF)"

[shell]
format = "$indicator"
fish_indicator = '¾░ł║ '
powershell_indicator = '¾░©Ŗ '
bash_indicator = "Ņ»Ŗ "
cmd_indicator = "Ņ»ä "
zsh_indicator = "z"
unknown_indicator = '$'
style = 'fg:black bg:red'
disabled = false

[directory]
format = " [$path]($style)[$read_only]($read_only_style)"
read_only_style = "red"
style = "cyan bold"
read_only = " ’ĆŻ "
home_symbol = "’ōó ~"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "ŌĆ”/"

[sudo]
format = "[$symbol]($style)"
style = "bold yellow"
symbol = " ¾▒Éŗ"
disabled = false

[git_branch]
format = ' [$symbol\($branch(:$remote_branch)\)]($style)'
symbol = "¾░Ŗó "
style = "red"

[git_status]
format = '[$all_status]($style)'
style = "red"

[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "red"
deleted_style = "red"
disabled = false

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "’Éś "

# Right prompt 


[username]
format = " [’Ćć $user]($style)"

[hostname]
format = " [$ssh_symbol$hostname]($style)"
ssh_symbol = "¾░ó® "

[cmd_duration]
format = ' ’ĆŚ  [$duration](bold yellow)'
min_time = 500

[package]
format = " [$symbol$version]($style) "

[nodejs]
format = " [$symbol($version )]($style)"
style = "bold green"

[python]
format = " [${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol = "¾░īĀ "

[rust]
format = " [$symbol($version )]($style)"
symbol = "¾▒śŚ "
