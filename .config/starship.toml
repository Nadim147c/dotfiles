# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """\
$os$hostname$shell\
$directory\
$git_branch$hg_branch\
$git_state\
$git_status\
$sudo\
$character\
"""

continuation_prompt = '[  => ](green bold)'

right_format = '${custom.git_tag}$all'

[character]
success_symbol = '[ َ°پ”](green bold)'
error_symbol = '[ َ°پ”](red bold)'
vimcmd_symbol = '[ îں…](blue bold)'

[os]
format = '$symbol'
disabled = false

[os.symbols]
Windows = '[îکھ ](#00C6FF)'
Ubuntu = '[َ°•ˆ ](#FF7800)'
Arch = '[َ°£‡ ](#00C6FF)'

[hostname]
format = '[\($hostname\)]($style) '
style = 'yellow'

[shell]
format = '$indicator'
fish_indicator = 'َ°ˆ؛ '
powershell_indicator = 'َ°¨ٹ '
bash_indicator = 'î¯ٹ '
cmd_indicator = 'î¯„ '
zsh_indicator = '[Z](bold)'
unknown_indicator = '$'
disabled = false

[directory]
format = ' [$path]($style)[$read_only]($read_only_style)'
read_only_style = 'red'
style = 'cyan bold'
read_only = ' ï€£ '
home_symbol = 'ï“¢ ~'
truncation_length = 3
truncate_to_repo = false
truncation_symbol = 'â€¦/'

[sudo]
format = '[$symbol]($style)'
style = 'bold yellow'
symbol = ' َ±گ‹'
disabled = false

[git_branch]
format = ' [$symbol\($branch(:$remote_branch)\)]($style)'
symbol = 'ïگک '
style = 'red'

[hg_branch]
format = '[ $symbol$branch ]($style)'
symbol = 'ïگک '

[git_status]
format = "([\\[](red)$conflicted$staged$modified$deleted$renamed$untracked$stashed[\\]](red))( $ahead_behind)"

conflicted = "[ !$count! ](red bold)"
ahead = "[â†‘${count}](yellow bold)"
behind = "[â†“${count}](yellow bold)"
diverged = "[â†‘${ahead_count}â†“${behind_count}](yellow bold)"
untracked = "[!$count](cyan bold)"
stashed = "[~$count](bold blue bold)"
modified = "[+$count](yellow bold)"
staged = "[+$count](green bold)"
renamed = "[>$count](green bold)"
deleted = "[-$count](red bold)"


# Right prompt 

[username]
format = ' [ï€‡ $user]($style)'

[cmd_duration]
format = ' ï€—  [$duration](bold yellow)'
min_time = 500

[git_metrics]
format = '( [َ°ٹ¢ ](red)\(([+$added]($added_style))([-$deleted]($deleted_style))\))'
disabled = false

[custom.git_tag]
format = "([$symbol($output)]($style))"
command = "git describe --tags --abbrev=0"
when = "git rev-parse --is-inside-work-tree"
symbol = "َ°“¼ "
style = "bold red"

[package]
format = ' [$symbol$version]($style) '

[nodejs]
format = ' [$symbol($version)]($style)'
style = 'bold green'

[bun]
format = ' [$symbol($version)]($style)'
style = 'bold white'

[python]
format = ' [${symbol}${pyenv_prefix}(${version})( \($virtualenv\))]($style)'
symbol = 'َ°Œ  '

[rust]
format = ' [$symbol($version )]($style)'
symbol = 'َ±ک— '

[lua]
format = ' [$symbol($version )]($style)'
symbol = 'َ°¢± '

[golang]
format = ' [$symbol($version )]($style)'
symbol = 'َ°ں“ '

[c]
format = " [$symbol($version(-$name) )]($style)"
symbol = "îک‍ "

[docker_context]
format = " [$symbol$context]($style) "
style = "blue bold"
symbol = "ïˆں "
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
disabled = false

[container]
format = "[$symbol \\[$name\\]]($style) "
disabled = false
